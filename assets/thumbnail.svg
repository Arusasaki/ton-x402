  <ellipse cx="1030" cy="250" rx="130" ry="110" fill="url(#glow-green)"/>
  <rect x="930" y="165" width="200" height="170" rx="14" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.25)" stroke-width="1.2"/>
  <rect x="930" y="165" width="200" height="4" rx="2" fill="#22C55E"/>
  <circle cx="948" cy="183" r="12" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="0.8"/>
  <text x="948" y="187" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="#22C55E">4</text>
