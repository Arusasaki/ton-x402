  </g>
  <text x="1030" y="275" text-anchor="middle" font-family="'Inter',sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">200 OK</text>
  <text x="1030" y="297" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#5B6B7F">data delivered</text>
  <text x="1030" y="318" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#4A5568">premium content unlocked</text>

  <!-- ============ METRICS BAR ============ -->

  <!-- Metric 1: 5 Packages -->
  <rect x="185" y="378" width="150" height="62" rx="12" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="260" y="408" text-anchor="middle" font-family="'Inter',sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">5</text>
  <text x="260" y="430" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="0.5">PACKAGES</text>

  <!-- Metric 2: 34 Tests -->
  <rect x="365" y="378" width="150" height="62" rx="12" fill="rgba(34,197,94,0.03)" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>
  <text x="440" y="408" text-anchor="middle" font-family="'Inter',sans-serif" font-size="28" font-weight="800" fill="#22C55E">34</text>
  <text x="440" y="430" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="0.5">TESTS</text>

  <!-- Metric 3: 0 Core Deps -->
  <rect x="545" y="378" width="150" height="62" rx="12" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
  <text x="620" y="408" text-anchor="middle" font-family="'Inter',sans-serif" font-size="28" font-weight="800" fill="#F59E0B">0</text>
  <text x="620" y="430" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="0.5">CORE DEPS</text>

  <!-- Metric 4: MCP Server -->
  <rect x="725" y="378" width="150" height="62" rx="12" fill="rgba(139,92,246,0.03)" stroke="rgba(139,92,246,0.12)" stroke-width="1"/>
  <text x="800" y="408" text-anchor="middle" font-family="'Inter',sans-serif" font-size="28" font-weight="800" fill="#8B5CF6">MCP</text>
  <text x="800" y="430" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="0.5">AI TOOLS</text>

  <!-- Metric 5: 1B+ Users -->
  <rect x="905" y="378" width="150" height="62" rx="12" fill="rgba(0,152,234,0.03)" stroke="rgba(0,152,234,0.12)" stroke-width="1"/>
  <text x="980" y="408" text-anchor="middle" font-family="'Inter',sans-serif" font-size="28" font-weight="800" fill="#0098EA">1B+</text>
  <text x="980" y="430" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="0.5">TON USERS</text>

  <!-- ============ CODE ONE-LINER ============ -->
  <g transform="translate(240, 478)">
    <rect x="0" y="0" width="800" height="50" rx="10" fill="rgba(6,10,20,0.85)" stroke="rgba(30,38,65,0.5)" stroke-width="1"/>
    <circle cx="20" cy="13" r="4" fill="#FF5F57" opacity="0.6"/>
    <circle cx="33" cy="13" r="4" fill="#FFBD2E" opacity="0.6"/>
    <circle cx="46" cy="13" r="4" fill="#28CA41" opacity="0.6"/>
    <text x="70" y="34" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="14">
      <tspan fill="#C792EA">const</tspan>
      <tspan fill="#E0E0E0"> data = </tspan>
      <tspan fill="#C792EA">await</tspan>
      <tspan fill="#E0E0E0"> client.</tspan>
      <tspan fill="#82AAFF">fetch</tspan>
      <tspan fill="#89DDFF">(</tspan>
      <tspan fill="#C3E88D">"https://api.example/premium"</tspan>
      <tspan fill="#89DDFF">)</tspan>
      <tspan fill="#546E7A">  // one line. that's it.</tspan>
    </text>
  </g>

  <!-- ============ BOTTOM ============ -->
  <text x="640" y="570" text-anchor="middle" font-family="'Inter',sans-serif" font-size="15" font-weight="500" fill="#4B5563">The first x402 implementation on TON blockchain</text>

  <text x="640" y="598" text-anchor="middle" font-family="'Inter',sans-serif" font-size="12" fill="#374151">
    <tspan>Open Source</tspan>
    <tspan fill="#2D3748"> &#183; </tspan>
    <tspan>MIT License</tspan>
    <tspan fill="#2D3748"> &#183; </tspan>
    <tspan>TypeScript Strict</tspan>
    <tspan fill="#2D3748"> &#183; </tspan>
    <tspan>Production Ready</tspan>
  </text>

  <!-- Separator line -->
  <line x1="520" y1="555" x2="760" y2="555" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>

  <!-- Bottom gradient fade -->
  <rect x="0" y="615" width="1280" height="25" fill="url(#bg)" opacity="0.6"/>
</svg>
