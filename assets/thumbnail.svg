  <text x="250" y="318" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#4A5568">requests premium API</text>

  <!-- Arrow 1 -->
  <line x1="356" y1="250" x2="402" y2="250" stroke="url(#arrow-1)" stroke-width="2.5" filter="url(#soft-glow)"/>
  <polygon points="408,250 396,243 396,257" fill="#F59E0B" opacity="0.9"/>

  <!-- Card 2: HTTP 402 (Amber) -->
  <ellipse cx="510" cy="250" rx="130" ry="110" fill="url(#glow-amber)"/>
  <rect x="410" y="165" width="200" height="170" rx="14" fill="rgba(245,158,11,0.05)" stroke="rgba(245,158,11,0.25)" stroke-width="1.2"/>
  <rect x="410" y="165" width="200" height="4" rx="2" fill="#F59E0B"/>
  <circle cx="428" cy="183" r="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="0.8"/>
  <text x="428" y="187" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="#F59E0B">2</text>
  <!-- 402 icon -->
  <text x="510" y="230" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-size="44" font-weight="800" fill="#F59E0B" opacity="0.85" filter="url(#soft-glow)">402</text>
  <text x="510" y="275" text-anchor="middle" font-family="'Inter',sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">Payment Required</text>
  <text x="510" y="297" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#5B6B7F">X-Payment: 0.01 TON</text>
  <text x="510" y="318" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#4A5568">server responds with price</text>

  <!-- Arrow 2 -->
  <line x1="616" y1="250" x2="662" y2="250" stroke="url(#arrow-2)" stroke-width="2.5" filter="url(#soft-glow)"/>
  <polygon points="668,250 656,243 656,257" fill="#00D4FF" opacity="0.9"/>

  <!-- Card 3: TON Payment (Cyan) -->
  <ellipse cx="770" cy="250" rx="130" ry="110" fill="url(#glow-cyan)"/>
  <rect x="670" y="165" width="200" height="170" rx="14" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.25)" stroke-width="1.2"/>
  <rect x="670" y="165" width="200" height="4" rx="2" fill="#00D4FF"/>
  <circle cx="688" cy="183" r="12" fill="rgba(0,212,255,0.15)" stroke="rgba(0,212,255,0.3)" stroke-width="0.8"/>
  <text x="688" y="187" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="#00D4FF">3</text>
  <!-- TON Diamond icon -->
  <g transform="translate(753, 197) scale(0.6)" filter="url(#soft-glow)">
    <path d="M28 56C43.464 56 56 43.464 56 28C56 12.536 43.464 0 28 0C12.536 0 0 12.536 0 28C0 43.464 12.536 56 28 56Z" fill="#00D4FF"/>
    <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6944 19.4202 14.4632 22.4861L26.2644 42.9409C27.0345 44.2765 28.9644 44.2765 29.7345 42.9409L41.5381 22.4861C43.3045 19.4251 41.0761 15.6277 37.5627 15.6277H37.5603ZM26.2548 36.8068L23.6847 31.8327L17.4833 20.7414C17.0742 20.0315 17.5795 19.1218 18.4362 19.1218H26.2524V36.8092L26.2548 36.8068ZM38.5108 20.739L32.3118 31.8351L29.7417 36.8068V19.1194H37.5579C38.4146 19.1194 38.9199 20.0291 38.5108 20.739Z" fill="white"/>
  </g>
  <text x="770" y="275" text-anchor="middle" font-family="'Inter',sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">TON Payment</text>
  <text x="770" y="297" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#5B6B7F">~5s &#183; ~$0.01</text>
  <text x="770" y="318" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#4A5568">on-chain verification</text>

