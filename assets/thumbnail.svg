  <!-- ============ HEADER ============ -->

  <!-- TON Diamond Logo (centered, small) -->
  <g transform="translate(620, 8) scale(0.72)" filter="url(#soft-glow)">
    <path d="M28 56C43.464 56 56 43.464 56 28C56 12.536 43.464 0 28 0C12.536 0 0 12.536 0 28C0 43.464 12.536 56 28 56Z" fill="#0098EA"/>
    <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6944 19.4202 14.4632 22.4861L26.2644 42.9409C27.0345 44.2765 28.9644 44.2765 29.7345 42.9409L41.5381 22.4861C43.3045 19.4251 41.0761 15.6277 37.5627 15.6277H37.5603ZM26.2548 36.8068L23.6847 31.8327L17.4833 20.7414C17.0742 20.0315 17.5795 19.1218 18.4362 19.1218H26.2524V36.8092L26.2548 36.8068ZM38.5108 20.739L32.3118 31.8351L29.7417 36.8068V19.1194H37.5579C38.4146 19.1194 38.9199 20.0291 38.5108 20.739Z" fill="white"/>
  </g>

  <!-- Title -->
  <text x="640" y="90" text-anchor="middle" font-family="'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif" font-size="58" font-weight="800" letter-spacing="-2" filter="url(#text-glow)">
    <tspan fill="#FFFFFF">ton-</tspan><tspan fill="url(#accent)">x402</tspan>
  </text>

  <!-- Subtitle -->
  <text x="640" y="120" text-anchor="middle" font-family="'Inter',-apple-system,sans-serif" font-size="19" font-weight="400" fill="#7A8399" letter-spacing="0.3">HTTP-native machine payments for the AI agent era</text>

  <!-- "First x402 on TON" badge -->
  <g transform="translate(1065, 16)">
    <rect x="0" y="0" width="185" height="30" rx="15" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="93" y="20" text-anchor="middle" font-family="'Inter',sans-serif" font-size="12" font-weight="700" fill="#F59E0B" letter-spacing="0.5">First x402 on TON</text>
  </g>

  <!-- ============ FLOW DIAGRAM ============ -->

  <!-- Card 1: AI Agent (Blue) -->
  <ellipse cx="250" cy="250" rx="130" ry="110" fill="url(#glow-blue)"/>
  <rect x="150" y="165" width="200" height="170" rx="14" fill="rgba(0,152,234,0.06)" stroke="rgba(0,152,234,0.25)" stroke-width="1.2"/>
  <rect x="150" y="165" width="200" height="4" rx="2" fill="#0098EA"/>
  <!-- Step badge -->
  <circle cx="168" cy="183" r="12" fill="rgba(0,152,234,0.15)" stroke="rgba(0,152,234,0.3)" stroke-width="0.8"/>
  <text x="168" y="187" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="#0098EA">1</text>
  <!-- Robot icon -->
  <g transform="translate(250, 218)">
    <rect x="-20" y="-16" width="40" height="30" rx="8" fill="none" stroke="#0098EA" stroke-width="2.2"/>
    <circle cx="-8" cy="-3" r="4.5" fill="#0098EA"/>
    <circle cx="8" cy="-3" r="4.5" fill="#0098EA"/>
    <line x1="0" y1="-16" x2="0" y2="-27" stroke="#0098EA" stroke-width="2.2"/>
    <circle cx="0" cy="-30" r="3.5" fill="#0098EA"/>
    <line x1="-12" y1="14" x2="-20" y2="22" stroke="#0098EA" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="14" x2="20" y2="22" stroke="#0098EA" stroke-width="1.5" stroke-linecap="round"/>
  </g>
