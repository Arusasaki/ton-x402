  <line x1="876" y1="250" x2="922" y2="250" stroke="url(#arrow-3)" stroke-width="2.5" filter="url(#soft-glow)"/>
  <polygon points="928,250 916,243 916,257" fill="#22C55E" opacity="0.9"/>

