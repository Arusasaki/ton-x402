    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="340" x2="1280" y2="340"/>
    <line x1="0" y1="450" x2="1280" y2="450"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
  </g>

  <!-- Subtle hex grid -->
  <g opacity="0.02" stroke="#0098EA" stroke-width="0.6" fill="none">
    <polygon points="80,100 110,83 140,100 140,134 110,151 80,134"/>
    <polygon points="140,100 170,83 200,100 200,134 170,151 140,134"/>
    <polygon points="1080,80 1110,63 1140,80 1140,114 1110,131 1080,114"/>
    <polygon points="1140,80 1170,63 1200,80 1200,114 1170,131 1140,114"/>
    <polygon points="60,480 90,463 120,480 120,514 90,531 60,514"/>
    <polygon points="1140,500 1170,483 1200,500 1200,534 1170,551 1140,534"/>
  </g>

