  <g opacity="0.3">
    <circle cx="95" cy="130" r="1.5" fill="#0098EA"/>
    <circle cx="230" cy="520" r="1" fill="#00D4FF"/>
    <circle cx="380" cy="70" r="1.5" fill="#0098EA"/>
    <circle cx="520" cy="580" r="1" fill="#00D4FF"/>
    <circle cx="760" cy="55" r="1.5" fill="#0098EA"/>
    <circle cx="920" cy="600" r="1" fill="#00D4FF"/>
    <circle cx="1100" cy="95" r="1.5" fill="#0098EA"/>
    <circle cx="1200" cy="530" r="1" fill="#00D4FF"/>
    <circle cx="450" cy="150" r="0.8" fill="#0098EA"/>
    <circle cx="850" cy="580" r="0.8" fill="#0098EA"/>
  </g>

  <!-- Network constellation -->
  <g opacity="0.06" stroke="#0098EA" stroke-width="0.8">
