    <line x1="130" y1="260" x2="100" y2="360"/>
    <line x1="100" y1="360" x2="60" y2="300"/>
    <line x1="1150" y1="280" x2="1220" y2="240"/>
    <line x1="1220" y1="240" x2="1230" y2="340"/>
    <line x1="1230" y1="340" x2="1150" y2="280"/>
  </g>
  <g opacity="0.12">
    <circle cx="60" cy="300" r="2" fill="#0098EA"/>
    <circle cx="130" cy="260" r="1.5" fill="#0098EA"/>
    <circle cx="100" cy="360" r="2" fill="#0098EA"/>
    <circle cx="1150" cy="280" r="2" fill="#0098EA"/>
    <circle cx="1220" cy="240" r="1.5" fill="#0098EA"/>
    <circle cx="1230" cy="340" r="2" fill="#0098EA"/>
