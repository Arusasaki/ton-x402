<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0E1A"/>
      <stop offset="100%" style="stop-color:#111528"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0098EA"/>
      <stop offset="100%" style="stop-color:#00B8FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="380" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="700" fill="#8890A4" letter-spacing="2">HOW X402 WORKS</text>

  <!-- Three actors -->
  <!-- AI Agent -->
  <rect x="40" y="60" width="140" height="44" rx="10" fill="rgba(0,152,234,0.15)" stroke="#0098EA" stroke-width="1.5"/>
  <text x="110" y="87" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#0098EA">AI Agent</text>

  <!-- API Server -->
  <rect x="330" y="60" width="140" height="44" rx="10" fill="rgba(139,92,246,0.15)" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="400" y="87" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#8B5CF6">API Server</text>

  <!-- TON Blockchain -->
  <rect x="620" y="60" width="140" height="44" rx="10" fill="rgba(34,197,94,0.15)" stroke="#22C55E" stroke-width="1.5"/>
  <text x="690" y="87" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#22C55E">TON Blockchain</text>

  <!-- Vertical lines -->
  <line x1="110" y1="104" x2="110" y2="350" stroke="#1E2340" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="400" y1="104" x2="400" y2="350" stroke="#1E2340" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="690" y1="104" x2="690" y2="350" stroke="#1E2340" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Step 1: GET request -->
  <line x1="120" y1="135" x2="390" y2="135" stroke="#0098EA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="175" y="120" width="160" height="24" rx="4" fill="#0B0E1A" stroke="#1E2340" stroke-width="1"/>
  <text x="255" y="137" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#E0E0E0">GET /api/data</text>
  <circle cx="38" cy="135" r="12" fill="rgba(0,152,234,0.2)" stroke="#0098EA" stroke-width="1.5"/>
  <text x="38" y="139" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#0098EA">1</text>

  <!-- Step 2: 402 response -->
  <line x1="390" y1="180" x2="120" y2="180" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <rect x="155" y="165" width="200" height="24" rx="4" fill="#0B0E1A" stroke="#1E2340" stroke-width="1"/>
  <text x="255" y="182" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#F59E0B">402 Payment Required</text>
  <circle cx="38" cy="180" r="12" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="38" y="184" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#F59E0B">2</text>

  <!-- Step 3: TON payment -->
  <line x1="120" y1="225" x2="680" y2="225" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="300" y="210" width="200" height="24" rx="4" fill="#0B0E1A" stroke="#1E2340" stroke-width="1"/>
  <text x="400" y="227" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#22C55E">Send 0.05 TON</text>
  <circle cx="38" cy="225" r="12" fill="rgba(34,197,94,0.2)" stroke="#22C55E" stroke-width="1.5"/>
  <text x="38" y="229" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#22C55E">3</text>

  <!-- Step 4: Retry with proof -->
  <line x1="120" y1="275" x2="390" y2="275" stroke="#0098EA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="130" y="260" width="250" height="24" rx="4" fill="#0B0E1A" stroke="#1E2340" stroke-width="1"/>
  <text x="255" y="277" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#E0E0E0">GET + X-Payment-Proof</text>
  <circle cx="38" cy="275" r="12" fill="rgba(0,152,234,0.2)" stroke="#0098EA" stroke-width="1.5"/>
  <text x="38" y="279" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#0098EA">4</text>

  <!-- Step 4b: Verify on-chain -->
  <line x1="410" y1="275" x2="680" y2="275" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowPurple)"/>
  <text x="545" y="268" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8B5CF6">verify</text>

  <!-- Step 5: 200 OK -->
  <line x1="390" y1="325" x2="120" y2="325" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <rect x="180" y="310" width="150" height="24" rx="4" fill="rgba(34,197,94,0.1)" stroke="#22C55E" stroke-width="1.5"/>
  <text x="255" y="327" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="700" fill="#22C55E">200 OK + Data</text>
  <circle cx="38" cy="325" r="12" fill="rgba(34,197,94,0.2)" stroke="#22C55E" stroke-width="1.5"/>
  <text x="38" y="329" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#22C55E">5</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0098EA"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse">
      <polygon points="8 0, 0 3, 8 6" fill="#F59E0B"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
